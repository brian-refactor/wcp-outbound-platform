<div class="flex items-center gap-8">
  <div>
    <div class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">ZeroBounce Credits Remaining</div>
    <div class="flex items-baseline gap-2">
      <span class="text-3xl font-bold {{ 'text-red-600' if low else 'text-gray-900' }}">
        {% if credits >= 0 %}{{ credits }}{% else %}—{% endif %}
      </span>
      <span class="text-sm text-gray-400">credits</span>
      {% if low %}
      <span class="inline-flex items-center gap-1 text-xs font-medium text-red-600 bg-red-50 border border-red-200 rounded-full px-2 py-0.5">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        Low — top up soon
      </span>
      {% endif %}
    </div>
  </div>
  <div class="border-l border-gray-200 pl-8">
    <div class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Emails Validated</div>
    <div class="text-3xl font-bold text-gray-900">{{ used }}</div>
  </div>
  <div class="border-l border-gray-200 pl-8 text-xs text-gray-400 leading-relaxed">
    Credits are consumed each time an email is<br>
    validated. Enrollment is blocked below 0.<br>
    <a href="https://app.zerobounce.net/members/creditrefill" target="_blank" rel="noopener"
       class="text-indigo-600 hover:underline mt-1 inline-block">Buy more credits →</a>
  </div>
</div>
