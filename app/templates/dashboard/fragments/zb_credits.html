<div class="mx-3 mt-2 rounded-lg {{ 'bg-red-900/40 border border-red-700/50' if low else 'bg-gray-800' }} px-3 py-2.5">
  <div class="flex items-center justify-between mb-1">
    <span class="text-xs font-semibold {{ 'text-red-400' if low else 'text-gray-400' }} uppercase tracking-wide">ZeroBounce</span>
    {% if low %}
    <svg class="w-3 h-3 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    {% endif %}
  </div>
  <div class="flex items-baseline gap-1.5">
    <span class="text-lg font-bold {{ 'text-red-300' if low else 'text-white' }}">
      {% if credits >= 0 %}{{ credits }}{% else %}—{% endif %}
    </span>
    <span class="text-xs {{ 'text-red-400' if low else 'text-gray-500' }}">credits</span>
  </div>
  <div class="text-xs text-gray-500 mt-0.5">{{ used }} validated</div>
</div>
