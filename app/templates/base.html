<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}WCP Outbound{% endblock %} - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    .nav-link {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.625rem 1rem; border-radius: 0.5rem;
      font-size: 0.875rem; font-weight: 500;
      color: #9ca3af; text-decoration: none; transition: all 0.15s;
    }
    .nav-link:hover { color: #fff; background: #1f2937; }
    .nav-link.active { color: #fff; background: #1f2937; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex">

  <!-- Mobile overlay backdrop -->
  <div id="sidebar-overlay"
       class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden"
       onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar"
         class="w-60 bg-gray-900 min-h-screen flex flex-col fixed top-0 left-0 z-30
                -translate-x-full lg:translate-x-0 transition-transform duration-200 ease-in-out">

    <div class="px-5 py-5 border-b border-gray-800 flex items-center justify-between">
      <div>
        <div class="text-white font-bold text-base leading-tight">WCP Outbound</div>
        <div class="text-gray-500 text-xs mt-0.5">Platform Dashboard</div>
      </div>
      <!-- Close button — mobile only -->
      <button class="lg:hidden text-gray-400 hover:text-white p-1" onclick="closeSidebar()">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/dashboard" class="nav-link {% if active_page == 'overview' %}active{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Overview
      </a>
      <a href="/dashboard/prospects" class="nav-link {% if active_page == 'prospects' %}active{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Prospects
      </a>
      <a href="/dashboard/sequences" class="nav-link {% if active_page == 'sequences' %}active{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        Sequences
      </a>
      <a href="/dashboard/mailboxes" class="nav-link {% if active_page == 'mailboxes' %}active{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        Mailboxes
      </a>
      <a href="/dashboard/deliverability" class="nav-link {% if active_page == 'deliverability' %}active{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
        Deliverability
      </a>
      <a href="/dashboard/sync" class="nav-link {% if active_page == 'sync' %}active{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        HubSpot Sync
      </a>
      <a href="/dashboard/leads" class="nav-link {% if active_page == 'leads' %}active{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        Lead Finder
      </a>
      <a href="/dashboard/spend" class="nav-link {% if active_page == 'spend' %}active{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        Monthly Spend
      </a>
    </nav>

    <div class="px-5 py-4 border-t border-gray-800 space-y-2 mt-4">
      <a href="/docs" target="_blank"
         class="text-xs text-gray-500 hover:text-gray-300 transition-colors flex items-center gap-1.5">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
        </svg>
        API Docs
      </a>
      <a href="/logout"
         class="text-xs text-gray-500 hover:text-gray-300 transition-colors flex items-center gap-1.5">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Sign out
      </a>
    </div>
  </aside>

  <!-- Main content -->
  <div class="lg:ml-60 flex-1 flex flex-col min-h-screen w-full">
    <!-- Top bar -->
    <header class="bg-white border-b border-gray-200 px-4 lg:px-8 py-4 flex items-center justify-between sticky top-0 z-10">
      <div class="flex items-center gap-3 min-w-0">
        <!-- Hamburger — mobile only -->
        <button id="sidebar-toggle"
                class="lg:hidden shrink-0 p-1.5 rounded-lg text-gray-500 hover:bg-gray-100 transition-colors"
                onclick="openSidebar()">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <h1 class="text-base lg:text-lg font-semibold text-gray-900 truncate">{% block heading %}Dashboard{% endblock %}</h1>
      </div>
      <div class="flex items-center gap-3 shrink-0">
        <span class="hidden sm:block text-xs text-gray-400" id="last-updated">
          Updated just now
        </span>
        <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse" title="Live"></div>
      </div>
    </header>

    <!-- Page content -->
    <main class="flex-1 px-4 lg:px-8 py-6">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script>
    function openSidebar() {
      document.getElementById('sidebar').classList.remove('-translate-x-full');
      document.getElementById('sidebar-overlay').classList.remove('hidden');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.add('-translate-x-full');
      document.getElementById('sidebar-overlay').classList.add('hidden');
    }

    // Update the "last updated" timestamp on every HTMX swap
    document.body.addEventListener('htmx:afterSwap', function() {
      const el = document.getElementById('last-updated');
      if (el) el.textContent = 'Updated ' + new Date().toLocaleTimeString();
    });
  </script>
</body>
</html>
