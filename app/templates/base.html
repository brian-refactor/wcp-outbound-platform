<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}WCP Outbound{% endblock %} - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    .nav-link {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.625rem 1rem; border-radius: 0.5rem;
      font-size: 0.875rem; font-weight: 500;
      color: #9ca3af; text-decoration: none; transition: all 0.15s;
    }
    .nav-link:hover { color: #fff; background: #1f2937; }
    .nav-link.active { color: #fff; background: #1f2937; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-60 bg-gray-900 min-h-screen flex flex-col fixed top-0 left-0 z-10">
    <div class="px-5 py-5 border-b border-gray-800">
      <div class="text-white font-bold text-base leading-tight">WCP Outbound</div>
      <div class="text-gray-500 text-xs mt-0.5">Platform Dashboard</div>
    </div>

    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/dashboard" class="nav-link {% if active_page == 'overview' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Overview
      </a>
      <a href="/dashboard/prospects" class="nav-link {% if active_page == 'prospects' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Prospects
      </a>
      <a href="/dashboard/sequences" class="nav-link {% if active_page == 'sequences' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        Sequences
      </a>
      <a href="/dashboard/mailboxes" class="nav-link {% if active_page == 'mailboxes' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        Mailboxes
      </a>
      <a href="/dashboard/sync" class="nav-link {% if active_page == 'sync' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        HubSpot Sync
      </a>
      <a href="/dashboard/leads" class="nav-link {% if active_page == 'leads' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        Lead Finder
      </a>
    </nav>

    {# ZeroBounce credits — loaded via HTMX so it works on every page #}
    <div hx-get="/dashboard/fragments/zb-credits"
         hx-trigger="load"
         hx-swap="innerHTML">
      <div class="mx-3 mt-2 rounded-lg bg-gray-800 px-3 py-2.5">
        <div class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">ZeroBounce</div>
        <div class="text-xs text-gray-600">Loading…</div>
      </div>
    </div>

    <div class="px-5 py-4 border-t border-gray-800 space-y-2 mt-4">
      <a href="/docs" target="_blank"
         class="text-xs text-gray-500 hover:text-gray-300 transition-colors flex items-center gap-1.5">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
        </svg>
        API Docs
      </a>
      <a href="/logout"
         class="text-xs text-gray-500 hover:text-gray-300 transition-colors flex items-center gap-1.5">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Sign out
      </a>
    </div>
  </aside>

  <!-- Main content -->
  <div class="ml-60 flex-1 flex flex-col min-h-screen">
    <!-- Top bar -->
    <header class="bg-white border-b border-gray-200 px-8 py-4 flex items-center justify-between sticky top-0 z-10">
      <h1 class="text-lg font-semibold text-gray-900">{% block heading %}Dashboard{% endblock %}</h1>
      <div class="flex items-center gap-3">
        <span class="text-xs text-gray-400" id="last-updated">
          Updated just now
        </span>
        <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse" title="Live"></div>
      </div>
    </header>

    <!-- Page content -->
    <main class="flex-1 px-8 py-6">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script>
    // Update the "last updated" timestamp on every HTMX swap
    document.body.addEventListener('htmx:afterSwap', function() {
      document.getElementById('last-updated').textContent =
        'Updated ' + new Date().toLocaleTimeString();
    });
  </script>
</body>
</html>
